<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#3b82f6">
    <title>الخدمات | Simify</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #00f2fe;
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: rgba(255,255,255,0.06);
            --success: #10b981;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Tajawal', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-primary); min-height: 100vh; padding: 16px 16px 80px; }
        .container { max-width: 500px; margin: 0 auto; }

        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .logo { font-size: 24px; font-weight: 900; color: var(--text-primary); text-decoration: none; }
        .logo span { color: var(--primary); }
        .balance { background: var(--bg-card); padding: 8px 16px; border-radius: 30px; border: 1px solid var(--border-color); cursor: pointer; }
        .balance i { color: var(--primary); margin-left: 6px; }

        .page-title { margin-bottom: 20px; }
        .page-title h1 { font-size: 28px; margin-bottom: 4px; }
        .page-title p { color: var(--text-secondary); font-size: 14px; }

        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        .search-box i {
            position: absolute;
            right: 16px;
            top: 14px;
            color: var(--text-secondary);
        }
        .search-box input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 15px;
        }

        .section-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-title h3 { font-size: 18px; }
        .section-title span { color: var(--text-secondary); font-size: 13px; }

        .services-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .service-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            border-radius: 20px;
            padding: 18px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .service-card:hover { border-color: var(--primary); transform: translateY(-2px); }

        .popular-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #000;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
        }

        .service-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 14px;
        }

        .service-icon {
            width: 56px;
            height: 56px;
            background: rgba(59,130,246,0.1);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 28px;
        }

        .service-info h3 { font-size: 17px; margin-bottom: 4px; }
        .service-info p { color: var(--text-secondary); font-size: 12px; }

        .countries-preview {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .country-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .country-row:last-child { border-bottom: none; }
        .country-name i { color: var(--primary); margin-left: 8px; }
        .country-price { font-weight: 700; color: var(--accent); }

        .more-countries {
            text-align: center;
            margin-top: 10px;
            color: var(--primary);
            font-size: 12px;
        }

        .loader {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        .loader i { font-size: 40px; margin-bottom: 16px; }

        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            justify-content: space-around;
        }
        .bottom-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
        }
        .bottom-nav a i { font-size: 20px; margin-bottom: 2px; }
        .bottom-nav a.active { color: var(--primary); }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: flex-end;
            z-index: 1000;
        }
        .modal.show { display: flex; }
        .modal-content {
            background: var(--bg-card);
            border-radius: 28px 28px 0 0;
            padding: 24px 20px 20px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            margin: 0 auto;
            animation: slideUp 0.3s;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .modal-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-close {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 12px;
            color: var(--text-secondary);
            font-size: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <a href="index.html" class="logo">SIMIFY<span>.</span></a>
        <div class="balance" onclick="location.href='funds.html'">
            <i class="fas fa-wallet"></i>
            <span id="balanceDisplay">0.00</span> ج.م
        </div>
    </div>

    <div class="page-title">
        <h1>الخدمات المتاحة</h1>
        <p>أشهر 10 خدمات - الأسعار بالجنيه المصري</p>
    </div>

    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن خدمة..." oninput="filterServices()">
    </div>

    <div id="content">
        <div class="loader">
            <i class="fas fa-spinner fa-pulse"></i>
            <p>جاري تحميل الخدمات...</p>
        </div>
    </div>
</div>

<nav class="bottom-nav">
    <a href="index.html"><i class="fas fa-home"></i><span>الرئيسية</span></a>
    <a href="dashboard.html" class="active"><i class="fas fa-columns"></i><span>الخدمات</span></a>
    <a href="activation.html"><i class="fas fa-history"></i><span>التفعيلات</span></a>
    <a href="funds.html"><i class="fas fa-wallet"></i><span>الرصيد</span></a>
</nav>

<!-- Modal الدول -->
<div class="modal" id="countriesModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">اختر الدولة</h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div id="modalContent"></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAfkuAvySUDyzmMWHFMFlx1FL0gGFYT3Ek",
        authDomain: "takhmen1.firebaseapp.com",
        projectId: "takhmen1",
        storageBucket: "takhmen1.firebasestorage.app",
        messagingSenderId: "558818074473",
        appId: "1:558818074473:web:907ff68e4c3fabb7fd27f8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const API_URL = 'https://simify-back.vercel.app/api';

    // أشهر 10 خدمات (اللي هنعرضهم)
    const POPULAR_CODES = ['tg', 'wa', 'gm', 'fb', 'ig', 'ds', 'tw', 'vk', 'nf', 'sn'];
    
    // أسماء الخدمات بالعربي
    const NAMES_AR = {
        'tg': 'تيليجرام', 'wa': 'واتساب', 'gm': 'جوجل', 'fb': 'فيسبوك',
        'ig': 'إنستجرام', 'ds': 'ديسكورد', 'tw': 'تويتر', 'vk': 'فكونتاكتي',
        'nf': 'نتفليكس', 'sn': 'سناب شات', 'go': 'جوجل فويس'
    };
    
    // أيقونات
    const ICONS = {
        'tg': 'paper-plane', 'wa': 'whatsapp', 'gm': 'google', 'fb': 'facebook',
        'ig': 'instagram', 'ds': 'discord', 'tw': 'twitter', 'vk': 'vk',
        'nf': 'netflix', 'sn': 'snapchat'
    };
    
    // أسعار تقريبية احتياطية (بالجنيه)
    const FALLBACK_PRICES = {
        'tg': { '0': 12.5, '12': 18, '21': 10 },
        'wa': { '12': 15, '21': 8, '53': 14 },
        'gm': { '16': 20, '12': 18, '21': 12 },
        'fb': { '12': 16, '21': 10 },
        'ig': { '12': 15, '21': 9 },
        'ds': { '12': 14, '0': 11 },
        'tw': { '12': 13, '21': 8 },
        'vk': { '0': 10 },
        'nf': { '12': 25, '16': 22 },
        'sn': { '12': 14, '21': 9 }
    };
    
    // أسماء الدول
    const COUNTRY_NAMES = {
        '0': 'روسيا', '12': 'الولايات المتحدة', '16': 'إنجلترا',
        '21': 'مصر', '53': 'السعودية', '43': 'ألمانيا'
    };

    let currentUser = null;
    let userBalance = 0;
    let allServices = [];
    let filteredServices = [];
    let currentService = null;

    // ==================== تحميل الخدمات والأسعار ====================
    async function loadServices() {
        try {
            // 1. نجيب كل الخدمات
            const servicesRes = await fetch(`${API_URL}/services`);
            const servicesData = await servicesRes.json();
            
            if (!servicesData.success || !servicesData.services) {
                throw new Error('No services');
            }
            
            // 2. نفلتر أشهر 10 خدمات
            const popularServices = servicesData.services
                .filter(s => POPULAR_CODES.includes(s.code))
                .map(s => ({
                    ...s,
                    nameAr: NAMES_AR[s.code] || s.name,
                    icon: ICONS[s.code] || 'globe'
                }));
            
            // 3. نجيب الأسعار لكل خدمة
            for (const service of popularServices) {
                try {
                    const pricesRes = await fetch(`${API_URL}/prices?service=${service.code}`);
                    const pricesData = await pricesRes.json();
                    
                    if (pricesData.success && pricesData.prices) {
                        const countries = [];
                        const prices = pricesData.prices;
                        
                        // ناخد أول 3 دول متاحة
                        for (const [code, services] of Object.entries(prices)) {
                            if (services[service.code] && services[service.code].costEgp) {
                                countries.push({
                                    code,
                                    name: COUNTRY_NAMES[code] || `دولة ${code}`,
                                    price: services[service.code].costEgp
                                });
                            }
                            if (countries.length >= 3) break;
                        }
                        
                        service.countries = countries.length > 0 ? countries : getFallbackCountries(service.code);
                    } else {
                        service.countries = getFallbackCountries(service.code);
                    }
                } catch (e) {
                    service.countries = getFallbackCountries(service.code);
                }
            }
            
            allServices = popularServices;
            filteredServices = [...allServices];
            renderServices();
            
        } catch (error) {
            console.error('Error:', error);
            // استخدام البيانات الاحتياطية
            loadFallbackServices();
        }
    }

    function getFallbackCountries(code) {
        const prices = FALLBACK_PRICES[code] || { '12': 15 };
        return Object.entries(prices).map(([code, price]) => ({
            code,
            name: COUNTRY_NAMES[code] || `دولة ${code}`,
            price
        }));
    }

    function loadFallbackServices() {
        allServices = POPULAR_CODES.map(code => ({
            code,
            name: code.toUpperCase(),
            nameAr: NAMES_AR[code] || code,
            icon: ICONS[code] || 'globe',
            countries: getFallbackCountries(code)
        }));
        filteredServices = [...allServices];
        renderServices();
    }

    // ==================== عرض ====================
    function renderServices() {
        const container = document.getElementById('content');
        
        if (filteredServices.length === 0) {
            container.innerHTML = `<div class="loader"><i class="fas fa-search"></i><p>لا توجد خدمات</p></div>`;
            return;
        }
        
        container.innerHTML = `
            <div class="section-title">
                <h3>الخدمات</h3>
                <span>${filteredServices.length} خدمات</span>
            </div>
            <div class="services-grid">
                ${filteredServices.map(service => `
                    <div class="service-card" onclick="openCountriesModal('${service.code}')">
                        <span class="popular-badge"><i class="fas fa-fire"></i> الأكثر طلباً</span>
                        <div class="service-header">
                            <div class="service-icon"><i class="fab fa-${service.icon}"></i></div>
                            <div class="service-info">
                                <h3>${service.nameAr}</h3>
                                <p>${service.countries?.length || 0} دول متاحة</p>
                            </div>
                        </div>
                        <div class="countries-preview">
                            ${service.countries?.slice(0, 3).map(c => `
                                <div class="country-row" onclick="event.stopPropagation(); buyNumber('${service.code}', '${c.code}', '${c.name}', ${c.price})">
                                    <span class="country-name"><i class="fas fa-flag"></i> ${c.name}</span>
                                    <span class="country-price">${c.price.toFixed(2)} ج.م</span>
                                </div>
                            `).join('') || ''}
                        </div>
                        ${service.countries?.length > 3 ? `
                            <div class="more-countries">
                                <i class="fas fa-chevron-down"></i> ${service.countries.length - 3} دول أخرى
                            </div>
                        ` : ''}
                    </div>
                `).join('')}
            </div>
        `;
    }

    window.filterServices = () => {
        const query = document.getElementById('searchInput').value.toLowerCase();
        filteredServices = query ? 
            allServices.filter(s => s.nameAr.toLowerCase().includes(query) || s.code.includes(query)) : 
            [...allServices];
        renderServices();
    };

    // ==================== Modal الدول ====================
    window.openCountriesModal = (code) => {
        currentService = allServices.find(s => s.code === code);
        if (!currentService) return;
        
        document.getElementById('modalTitle').textContent = currentService.nameAr;
        
        const content = document.getElementById('modalContent');
        content.innerHTML = currentService.countries.map(c => `
            <div class="country-row" style="cursor: pointer;" onclick="selectCountry('${c.code}', '${c.name}', ${c.price})">
                <span class="country-name"><i class="fas fa-flag"></i> ${c.name}</span>
                <span class="country-price">${c.price.toFixed(2)} ج.م</span>
            </div>
        `).join('');
        
        document.getElementById('countriesModal').classList.add('show');
    };

    window.closeModal = () => {
        document.getElementById('countriesModal').classList.remove('show');
    };

    window.selectCountry = (code, name, price) => {
        closeModal();
        buyNumber(currentService.code, code, name, price);
    };

    // ==================== شراء ====================
    window.buyNumber = (service, country, countryName, price) => {
        if (userBalance < price) {
            alert(`رصيدك غير كافي. المطلوب ${price.toFixed(2)} ج.م`);
            location.href = 'funds.html';
            return;
        }
        
        if (confirm(`تأكيد شراء رقم ${currentService?.nameAr || service} من ${countryName} بسعر ${price.toFixed(2)} ج.م؟`)) {
            alert('جاري الشراء...');
            // استدعاء API الشراء
            fetch(`${API_URL}/get-number?uid=${currentUser.uid}&service=${service}&country=${country}`)
                .then(r => r.json())
                .then(d => {
                    if (d.success) {
                        userBalance = d.remainingBalance;
                        document.getElementById('balanceDisplay').textContent = userBalance.toFixed(2);
                        alert(`تم شراء الرقم ${d.phoneNumber}`);
                        location.href = 'activation.html';
                    } else {
                        alert(d.error || 'حدث خطأ');
                    }
                })
                .catch(() => alert('حدث خطأ في الاتصال'));
        }
    };

    // ==================== مستخدم ====================
    auth.onAuthStateChanged(async (user) => {
        if (!user) { location.href = 'auth.html'; return; }
        currentUser = user;
        
        try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                userBalance = doc.data().balance || 0;
                document.getElementById('balanceDisplay').textContent = userBalance.toFixed(2);
            }
        } catch (e) {}
        
        loadServices();
    });

    // إغلاق المودال بالضغط خارجها
    document.getElementById('countriesModal').addEventListener('click', (e) => {
        if (e.target.classList.contains('modal')) closeModal();
    });
</script>
</body>
</html>
