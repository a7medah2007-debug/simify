<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>الخدمات | Simify</title>
    
    <!-- Fonts & Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.css">
    
    <style>
        /* ==================== نظام التصميم الأسطوري ==================== */
        :root {
            --primary: #3b82f6;
            --primary-dark: #2563eb;
            --primary-light: #60a5fa;
            --primary-soft: rgba(59, 130, 246, 0.12);
            --accent: #00f2fe;
            --accent-gradient: linear-gradient(135deg, var(--primary), var(--accent));
            
            --bg-primary: #020617;
            --bg-secondary: #0f172a;
            --bg-card: rgba(15, 23, 42, 0.95);
            --bg-glass: rgba(255, 255, 255, 0.03);
            
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            
            --border-color: rgba(255, 255, 255, 0.06);
            --border-light: rgba(255, 255, 255, 0.1);
            
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            
            --radius-sm: 8px;
            --radius-md: 14px;
            --radius-lg: 20px;
            --radius-xl: 28px;
            --radius-full: 9999px;
            
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.15);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.3);
            --shadow-glow: 0 0 30px rgba(59, 130, 246, 0.2);
            
            --transition-fast: 0.15s ease;
            --transition-base: 0.25s ease;
            
            --font-xs: 11px;
            --font-sm: 13px;
            --font-base: 14px;
            --font-md: 15px;
            --font-lg: 16px;
            --font-xl: 18px;
            --font-2xl: 20px;
            --font-3xl: 24px;
            --font-4xl: 28px;
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: rgba(255, 255, 255, 0.95);
            --bg-glass: rgba(255, 255, 255, 0.6);
            --text-primary: #0f172a;
            --text-secondary: #475569;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.06);
            --border-light: rgba(0, 0, 0, 0.1);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 12px 36px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            padding-bottom: 80px;
            transition: background var(--transition-base), color var(--transition-base);
        }

        .container {
            padding: 0 14px;
            max-width: 500px;
            margin: 0 auto;
        }

        /* ==================== زخارف خلفية ==================== */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: -1;
        }
        .bg-decoration::before {
            content: '';
            position: absolute;
            top: -20%;
            right: -30%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.06) 0%, transparent 70%);
            border-radius: 50%;
        }
        .bg-decoration::after {
            content: '';
            position: absolute;
            bottom: -10%;
            left: -20%;
            width: 350px;
            height: 350px;
            background: radial-gradient(circle, rgba(0, 242, 254, 0.04) 0%, transparent 70%);
            border-radius: 50%;
        }

        /* ==================== الهيدر ==================== */
        .header {
            padding: 16px 0;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            background: var(--bg-primary);
            backdrop-filter: blur(12px);
            z-index: 50;
        }

        .header-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .logo i { color: var(--primary); font-size: 22px; }
        .logo span { color: var(--primary); }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .theme-toggle {
            width: 42px;
            height: 42px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .theme-toggle:hover { border-color: var(--primary); color: var(--primary); }

        .balance-badge {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .balance-badge:hover { border-color: var(--primary); }
        .balance-badge i { color: var(--primary); font-size: 16px; }
        .balance-amount {
            font-weight: 800;
            font-size: var(--font-md);
            color: var(--accent);
        }

        /* ==================== عنوان الصفحة ==================== */
        .page-hero {
            padding: 24px 0 16px;
        }
        .page-hero h1 {
            font-size: var(--font-4xl);
            font-weight: 900;
            margin-bottom: 6px;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .page-hero p {
            color: var(--text-secondary);
            font-size: var(--font-sm);
        }

        /* ==================== شريط البحث ==================== */
        .search-wrapper {
            position: relative;
            margin-bottom: 20px;
        }
        .search-wrapper i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 18px;
        }
        .search-wrapper input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-lg);
            color: var(--text-primary);
            font-size: var(--font-base);
            transition: border-color var(--transition-fast);
        }
        .search-wrapper input:focus {
            outline: none;
            border-color: var(--primary);
        }
        .search-wrapper input::placeholder {
            color: var(--text-muted);
        }

        /* ==================== بطاقات الخدمات ==================== */
        .section-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-title h2 {
            font-size: var(--font-xl);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .section-title h2 i { color: var(--primary); }
        .section-title span {
            color: var(--text-secondary);
            font-size: var(--font-sm);
        }

        .services-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .service-card {
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 18px 16px;
            cursor: pointer;
            transition: all var(--transition-base);
            position: relative;
            overflow: hidden;
        }
        .service-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .service-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-gradient);
            transform: scaleX(0);
            transition: transform var(--transition-base);
        }
        .service-card:hover::before { transform: scaleX(1); }

        .service-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 14px;
        }

        .service-icon {
            width: 56px;
            height: 56px;
            background: var(--primary-soft);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 28px;
            transition: all var(--transition-base);
        }
        .service-card:hover .service-icon {
            background: var(--primary);
            color: #fff;
            transform: scale(1.05);
        }

        .service-info h3 {
            font-size: var(--font-lg);
            font-weight: 700;
            margin-bottom: 4px;
        }
        .service-info p {
            color: var(--text-secondary);
            font-size: var(--font-xs);
        }

        .popular-tag {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--accent-gradient);
            color: #000;
            padding: 3px 10px;
            border-radius: var(--radius-full);
            font-size: 10px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .countries-preview {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .country-mini-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid var(--border-color);
        }
        .country-mini-row:last-child { border-bottom: none; }

        .country-mini-name {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: var(--font-sm);
        }
        .country-mini-name i { color: var(--primary); font-size: 12px; }

        .country-mini-price {
            font-weight: 700;
            color: var(--accent);
            font-size: var(--font-sm);
        }

        .more-countries-hint {
            text-align: center;
            margin-top: 10px;
            color: var(--primary);
            font-size: var(--font-xs);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* ==================== حالة التحميل ==================== */
        .loading-state {
            text-align: center;
            padding: 60px 20px;
        }
        .loading-spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-state {
            text-align: center;
            padding: 60px 20px;
        }
        .error-icon {
            width: 70px;
            height: 70px;
            margin: 0 auto 20px;
            background: var(--danger);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 32px;
            opacity: 0.8;
        }

        /* ==================== Modal ==================== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(6px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl) var(--radius-xl) 0 0;
            padding: 24px 20px 20px;
            max-width: 500px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .modal-header h3 {
            font-size: var(--font-xl);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .modal-close {
            width: 40px;
            height: 40px;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 20px;
        }

        .modal-search {
            position: relative;
            margin-bottom: 20px;
        }
        .modal-search i {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }
        .modal-search input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            background: var(--bg-primary);
            border: 1.5px solid var(--border-color);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: var(--font-base);
        }

        .countries-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .country-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            background: var(--bg-glass);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        .country-item:hover {
            border-color: var(--primary);
            background: var(--primary-soft);
        }

        .country-item-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .country-flag-icon {
            width: 40px;
            height: 40px;
            background: var(--primary-soft);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 18px;
        }
        .country-item-info h4 { font-size: var(--font-base); font-weight: 600; margin-bottom: 2px; }
        .country-item-info p { color: var(--text-secondary); font-size: var(--font-xs); }

        .country-item-price {
            font-weight: 800;
            font-size: var(--font-lg);
            color: var(--accent);
        }

        /* ==================== شريط التنقل السفلي ==================== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            backdrop-filter: blur(15px);
            border-top: 1px solid var(--border-color);
            padding: 6px 16px;
            display: flex;
            justify-content: space-around;
            z-index: 99;
        }
        .bottom-nav a {
            color: var(--text-muted);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            font-size: 10px;
            font-weight: 500;
            padding: 5px 10px;
            border-radius: var(--radius-full);
            transition: all var(--transition-fast);
        }
        .bottom-nav a i { font-size: 20px; }
        .bottom-nav a.active {
            color: var(--primary);
            background: var(--primary-soft);
        }

        /* ==================== Toast ==================== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            max-width: 400px;
            margin: 0 auto;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.success { border-right: 4px solid var(--success); }
        .toast.error { border-right: 4px solid var(--danger); }
        .toast i { font-size: 24px; }
        .toast.success i { color: var(--success); }
        .toast.error i { color: var(--danger); }
        .toast-content { flex: 1; }
        .toast-title { font-weight: 700; margin-bottom: 2px; }
        .toast-message { font-size: var(--font-sm); color: var(--text-secondary); }
    </style>
</head>
<body data-theme="dark">

<div class="bg-decoration"></div>

<!-- الهيدر -->
<header class="header">
    <div class="container">
        <div class="header-row">
            <a href="index.html" class="logo">
                <i class="fas fa-sim-card"></i>
                SIMIFY<span>.</span>
            </a>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="balance-badge" onclick="location.href='funds.html'">
                    <i class="fas fa-wallet"></i>
                    <span class="balance-amount" id="balanceDisplay">0.00</span>
                    <span style="color: var(--text-secondary);">ج.م</span>
                </div>
            </div>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <!-- عنوان الصفحة -->
        <div class="page-hero">
            <h1>الخدمات المتاحة</h1>
            <p>أرقام حقيقية من 190+ دولة - الأسعار بالجنيه المصري</p>
        </div>

        <!-- شريط البحث -->
        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="ابحث عن خدمة..." oninput="filterServices()">
        </div>

        <!-- المحتوى الديناميكي -->
        <div id="dynamicContent">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p style="color: var(--text-secondary);">جاري تحميل الخدمات...</p>
            </div>
        </div>
    </div>
</main>

<!-- شريط التنقل السفلي -->
<nav class="bottom-nav">
    <a href="index.html"><i class="fas fa-home"></i><span>الرئيسية</span></a>
    <a href="dashboard.html" class="active"><i class="fas fa-columns"></i><span>الخدمات</span></a>
    <a href="activation.html"><i class="fas fa-history"></i><span>التفعيلات</span></a>
    <a href="funds.html"><i class="fas fa-wallet"></i><span>الرصيد</span></a>
</nav>

<!-- Toast -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <div class="toast-content">
        <div class="toast-title" id="toastTitle">نجاح</div>
        <div class="toast-message" id="toastMessage">تمت العملية</div>
    </div>
</div>

<!-- Modal الخدمة والدول -->
<div class="modal-overlay" id="serviceModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">
                <i class="fas fa-globe"></i>
                <span>اختر الدولة</span>
            </h3>
            <button class="modal-close" onclick="closeModal()">&times;</button>
        </div>
        <div class="modal-search">
            <i class="fas fa-search"></i>
            <input type="text" id="modalSearch" placeholder="ابحث عن دولة..." oninput="filterModalCountries()">
        </div>
        <div class="countries-list" id="modalCountriesList">
            <!-- سيتم ملؤها ديناميكياً -->
        </div>
    </div>
</div>

<!-- Firebase & Scripts -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/aos/2.3.4/aos.js"></script>

<script>
    // ==================== CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyAfkuAvySUDyzmMWHFMFlx1FL0gGFYT3Ek",
        authDomain: "takhmen1.firebaseapp.com",
        projectId: "takhmen1",
        storageBucket: "takhmen1.firebasestorage.app",
        messagingSenderId: "558818074473",
        appId: "1:558818074473:web:907ff68e4c3fabb7fd27f8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const API_URL = 'https://simify-back.vercel.app/api';

    // ==================== STATE ====================
    let currentUser = null;
    let userBalance = 0;
    let allServices = [];
    let filteredServices = [];
    let searchQuery = '';
    let currentModalService = null;
    let modalCountries = [];
    let modalFilteredCountries = [];

    // ==================== THEME ====================
    function toggleTheme() {
        const body = document.body;
        const isDark = body.getAttribute('data-theme') === 'dark';
        body.setAttribute('data-theme', isDark ? 'light' : 'dark');
        document.querySelector('#themeToggle i').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
        localStorage.setItem('simify_theme', isDark ? 'light' : 'dark');
    }
    
    const savedTheme = localStorage.getItem('simify_theme');
    if (savedTheme) {
        document.body.setAttribute('data-theme', savedTheme);
        document.querySelector('#themeToggle i').className = savedTheme === 'light' ? 'fas fa-sun' : 'fas fa-moon';
    }

    // ==================== TOAST ====================
    function showToast(title, message, type = 'success') {
        const toast = document.getElementById('toast');
        document.getElementById('toastTitle').textContent = title;
        document.getElementById('toastMessage').textContent = message;
        toast.className = `toast show ${type}`;
        toast.querySelector('i').className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // ==================== تحميل الخدمات ====================
    async function loadServices() {
        const container = document.getElementById('dynamicContent');
        
        try {
            const response = await fetch(`${API_URL}/popular-services`);
            const data = await response.json();
            
            if (data.success && data.services && data.services.length > 0) {
                allServices = data.services;
                filteredServices = [...allServices];
                renderServices();
            } else {
                throw new Error('No services');
            }
        } catch (error) {
            console.error('Error loading services:', error);
            container.innerHTML = `
                <div class="error-state">
                    <div class="error-icon"><i class="fas fa-exclamation-triangle"></i></div>
                    <h3 style="margin-bottom: 8px;">تعذر تحميل الخدمات</h3>
                    <p style="color: var(--text-secondary); margin-bottom: 24px;">يرجى التحقق من اتصالك بالإنترنت</p>
                    <button class="balance-badge" onclick="loadServices()" style="padding: 12px 24px;">
                        <i class="fas fa-sync-alt"></i> إعادة المحاولة
                    </button>
                </div>
            `;
        }
    }

    // ==================== عرض الخدمات ====================
    function renderServices() {
        const container = document.getElementById('dynamicContent');
        
        if (filteredServices.length === 0) {
            container.innerHTML = `
                <div class="error-state">
                    <div class="error-icon"><i class="fas fa-search"></i></div>
                    <h3>لا توجد خدمات</h3>
                    <p style="color: var(--text-secondary);">جرب البحث عن شيء آخر</p>
                </div>
            `;
            return;
        }
        
        const popularCodes = ['tg', 'wa', 'gm', 'fb', 'ig', 'ds'];
        
        container.innerHTML = `
            <div class="section-title">
                <h2><i class="fas fa-th-large"></i> الخدمات</h2>
                <span>${filteredServices.length} خدمة</span>
            </div>
            <div class="services-grid">
                ${filteredServices.map(service => {
                    const isPopular = popularCodes.includes(service.code);
                    const minPrice = service.minPrice || (service.countries[0]?.priceEgp || 0);
                    
                    return `
                        <div class="service-card" onclick="openServiceModal('${service.code}')">
                            ${isPopular ? '<span class="popular-tag"><i class="fas fa-fire"></i> الأكثر طلباً</span>' : ''}
                            <div class="service-header">
                                <div class="service-icon">
                                    <i class="fab fa-${service.icon || 'globe'}"></i>
                                </div>
                                <div class="service-info">
                                    <h3>${service.nameAr || service.name}</h3>
                                    <p>${service.totalCountries} دولة متاحة</p>
                                </div>
                            </div>
                            <div class="countries-preview">
                                ${service.countries.slice(0, 3).map(c => `
                                    <div class="country-mini-row" onclick="event.stopPropagation(); quickBuy('${service.code}', '${c.code}', '${c.name}', ${c.priceEgp})">
                                        <span class="country-mini-name"><i class="fas fa-flag"></i> ${c.name}</span>
                                        <span class="country-mini-price">${c.priceEgp.toFixed(2)} ج.م</span>
                                    </div>
                                `).join('')}
                            </div>
                            ${service.countries.length > 3 ? `
                                <div class="more-countries-hint">
                                    <i class="fas fa-chevron-down"></i>
                                    ${service.countries.length - 3} دول أخرى - اضغط للعرض
                                </div>
                            ` : ''}
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    // ==================== تصفية ====================
    window.filterServices = () => {
        searchQuery = document.getElementById('searchInput').value.toLowerCase();
        
        if (!searchQuery) {
            filteredServices = [...allServices];
        } else {
            filteredServices = allServices.filter(s => 
                (s.nameAr || s.name).toLowerCase().includes(searchQuery) ||
                s.code.toLowerCase().includes(searchQuery)
            );
        }
        
        renderServices();
    };

    // ==================== Modal ====================
    window.openServiceModal = async (serviceCode) => {
        const service = allServices.find(s => s.code === serviceCode);
        if (!service) return;
        
        currentModalService = service;
        
        document.getElementById('modalTitle').innerHTML = `
            <i class="fab fa-${service.icon || 'globe'}"></i>
            <span>${service.nameAr || service.name}</span>
        `;
        
        document.getElementById('modalCountriesList').innerHTML = `
            <div class="loading-state" style="padding: 30px;">
                <div class="loading-spinner"></div>
                <p>جاري تحميل الدول...</p>
            </div>
        `;
        
        document.getElementById('serviceModal').classList.add('show');
        document.getElementById('modalSearch').value = '';
        
        try {
            // جلب كل الدول للخدمة
            const response = await fetch(`${API_URL}/service-countries?service=${serviceCode}`);
            const data = await response.json();
            
            if (data.success && data.countries) {
                modalCountries = data.countries;
                modalFilteredCountries = [...modalCountries];
                renderModalCountries();
            } else {
                // استخدام الدول الموجودة في الخدمة
                modalCountries = service.countries || [];
                modalFilteredCountries = [...modalCountries];
                renderModalCountries();
            }
        } catch (error) {
            // استخدام الدول الموجودة في الخدمة
            modalCountries = service.countries || [];
            modalFilteredCountries = [...modalCountries];
            renderModalCountries();
        }
    };

    function renderModalCountries() {
        const container = document.getElementById('modalCountriesList');
        
        if (modalFilteredCountries.length === 0) {
            container.innerHTML = `
                <div class="error-state" style="padding: 30px;">
                    <i class="fas fa-search" style="font-size: 40px; opacity: 0.5;"></i>
                    <p style="color: var(--text-secondary);">لا توجد دول متاحة</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = modalFilteredCountries.map(c => `
            <div class="country-item" onclick="selectCountry('${c.code}', '${c.name}', ${c.priceEgp})">
                <div class="country-item-info">
                    <div class="country-flag-icon"><i class="fas fa-flag"></i></div>
                    <div>
                        <h4>${c.name}</h4>
                        <p>${c.count || 0} رقم متاح</p>
                    </div>
                </div>
                <div class="country-item-price">${c.priceEgp.toFixed(2)} ج.م</div>
            </div>
        `).join('');
    }

    window.filterModalCountries = () => {
        const query = document.getElementById('modalSearch').value.toLowerCase();
        
        if (!query) {
            modalFilteredCountries = [...modalCountries];
        } else {
            modalFilteredCountries = modalCountries.filter(c => 
                c.name.toLowerCase().includes(query) || c.code.includes(query)
            );
        }
        
        renderModalCountries();
    };

    window.closeModal = () => {
        document.getElementById('serviceModal').classList.remove('show');
    };

    // ==================== شراء ====================
    window.quickBuy = (service, country, countryName, price) => {
        if (userBalance < price) {
            showToast('رصيد غير كافي', `المطلوب ${price} ج.م - رصيدك ${userBalance.toFixed(2)} ج.م`, 'error');
            location.href = 'funds.html';
            return;
        }
        
        if (confirm(`تأكيد شراء رقم ${currentModalService?.nameAr || service} من ${countryName} بسعر ${price} ج.م؟`)) {
            // هنا استدعاء API الشراء
            showToast('جاري الشراء', 'يتم معالجة طلبك...');
        }
    };

    window.selectCountry = (country, countryName, price) => {
        closeModal();
        quickBuy(currentModalService?.code, country, countryName, price);
    };

    // ==================== مستخدم ====================
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            location.href = 'auth.html';
            return;
        }
        
        currentUser = user;
        
        try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                userBalance = doc.data().balance || 0;
                document.getElementById('balanceDisplay').textContent = userBalance.toFixed(2);
            }
        } catch (e) {}
        
        loadServices();
    });

    // ==================== تهيئة ====================
    AOS.init({ duration: 500, once: true });
    
    // إغلاق المودال بالضغط خارجها
    document.getElementById('serviceModal').addEventListener('click', (e) => {
        if (e.target.classList.contains('modal-overlay')) {
            closeModal();
        }
    });
</script>
</body>
</html>
