<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <meta name="theme-color" content="#3b82f6">
    <title>الخدمات | Simify</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #3b82f6;
            --accent: #00f2fe;
            --bg-dark: #020617;
            --bg-card: #0f172a;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: rgba(255,255,255,0.06);
            --success: #10b981;
            --danger: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Tajawal', sans-serif;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 16px 16px 80px;
        }

        .container { max-width: 500px; margin: 0 auto; }

        /* هيدر */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .logo {
            font-size: 24px;
            font-weight: 900;
            color: var(--text-primary);
            text-decoration: none;
        }
        .logo span { color: var(--primary); }
        .balance {
            background: var(--bg-card);
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }
        .balance i { color: var(--primary); margin-left: 6px; }

        /* بحث */
        .search-box {
            position: relative;
            margin-bottom: 16px;
        }
        .search-box i {
            position: absolute;
            right: 16px;
            top: 14px;
            color: var(--text-secondary);
        }
        .search-box input {
            width: 100%;
            padding: 14px 48px 14px 16px;
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            border-radius: 40px;
            color: var(--text-primary);
            font-size: 15px;
        }

        /* تصنيفات */
        .categories {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 8px 0;
            margin-bottom: 20px;
        }
        .category {
            padding: 8px 18px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 30px;
            color: var(--text-secondary);
            font-size: 13px;
            white-space: nowrap;
            cursor: pointer;
        }
        .category.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* عنوان القسم */
        .section-title {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
        }
        .section-title h3 { font-size: 18px; }
        .section-title span { color: var(--text-secondary); font-size: 13px; }

        /* شبكة الخدمات */
        .services-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .service-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            border-radius: 20px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .service-card:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
        }
        .service-card i {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 12px;
        }
        .service-card h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }
        .service-card p {
            color: var(--text-secondary);
            font-size: 11px;
            text-transform: uppercase;
        }
        .popular-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--primary);
            color: white;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 9px;
            font-weight: 700;
        }

        /* شاشة الدول */
        .countries-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .country-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border-color);
            border-radius: 16px;
            padding: 16px 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }
        .country-flag {
            width: 42px;
            height: 42px;
            background: rgba(59,130,246,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 20px;
        }
        .country-info h4 { font-size: 15px; margin-bottom: 2px; }
        .country-info p { color: var(--text-secondary); font-size: 11px; }
        .country-price { font-weight: 700; color: var(--accent); }

        /* رجوع */
        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--primary);
            margin-bottom: 16px;
            cursor: pointer;
        }

        /* تحميل */
        .loader {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        .loader i { font-size: 40px; margin-bottom: 16px; }

        /* تنقل سفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border-color);
            padding: 8px 16px;
            display: flex;
            justify-content: space-around;
        }
        .bottom-nav a {
            color: var(--text-secondary);
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            font-size: 11px;
        }
        .bottom-nav a i { font-size: 20px; margin-bottom: 2px; }
        .bottom-nav a.active { color: var(--primary); }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 20px;
            right: 20px;
            background: var(--bg-card);
            border-right: 4px solid var(--success);
            padding: 16px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 12px;
            max-width: 400px;
            margin: 0 auto;
            z-index: 1000;
        }
        .toast.show { display: flex; }
    </style>
</head>
<body>

<div class="container">
    <!-- هيدر -->
    <div class="header">
        <a href="index.html" class="logo">SIMIFY<span>.</span></a>
        <div class="balance" onclick="location.href='funds.html'">
            <i class="fas fa-wallet"></i>
            <span id="balanceDisplay">0.00</span> ج.م
        </div>
    </div>

    <!-- بحث -->
    <div class="search-box">
        <i class="fas fa-search"></i>
        <input type="text" id="searchInput" placeholder="ابحث عن خدمة..." oninput="filterServices()">
    </div>

    <!-- تصنيفات -->
    <div class="categories">
        <span class="category active" onclick="filterCategory('all')">الكل</span>
        <span class="category" onclick="filterCategory('social')">تواصل</span>
        <span class="category" onclick="filterCategory('email')">بريد</span>
        <span class="category" onclick="filterCategory('finance')">مالية</span>
        <span class="category" onclick="filterCategory('other')">أخرى</span>
    </div>

    <!-- المحتوى الديناميكي -->
    <div id="content"></div>
</div>

<!-- تنقل سفلي -->
<nav class="bottom-nav">
    <a href="index.html"><i class="fas fa-home"></i><span>الرئيسية</span></a>
    <a href="dashboard.html" class="active"><i class="fas fa-columns"></i><span>الخدمات</span></a>
    <a href="activation.html"><i class="fas fa-history"></i><span>التفعيلات</span></a>
    <a href="funds.html"><i class="fas fa-wallet"></i><span>الرصيد</span></a>
</nav>

<!-- Toast -->
<div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <div><strong id="toastTitle">نجاح</strong><br><span id="toastMessage"></span></div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

<script>
    // ==================== CONFIG ====================
    const firebaseConfig = {
        apiKey: "AIzaSyAfkuAvySUDyzmMWHFMFlx1FL0gGFYT3Ek",
        authDomain: "takhmen1.firebaseapp.com",
        projectId: "takhmen1",
        storageBucket: "takhmen1.firebasestorage.app",
        messagingSenderId: "558818074473",
        appId: "1:558818074473:web:907ff68e4c3fabb7fd27f8"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    const API_URL = 'https://simify-back.vercel.app/api';

    // ==================== STATE ====================
    let currentUser = null;
    let userBalance = 0;
    let allServices = [];
    let filteredServices = [];
    let currentCategory = 'all';
    let searchQuery = '';
    let selectedService = null;

    // أسماء الخدمات بالعربي
    const serviceNamesAr = {
        'tg': 'تيليجرام', 'wa': 'واتساب', 'wb': 'واتساب بزنس', 'vk': 'فكونتاكتي',
        'fb': 'فيسبوك', 'ig': 'إنستجرام', 'tw': 'تويتر', 'gm': 'جوجل',
        'go': 'جوجل فويس', 'ya': 'ياندكس', 'pp': 'باي بال', 'am': 'أمازون',
        'ds': 'ديسكورد', 'nf': 'نتفليكس', 'ts': 'باي بال', 'sn': 'سناب شات',
        'im': 'إيمو', 'me': 'لاين', 'vi': 'فايبر', 'ok': 'أودنوكلاسنيكي',
        'ma': 'مايل.رو', 'ml': 'مايل.رو', 'bv': 'بينانس', 'sf': 'سبوتيفاي',
        'ub': 'أوبر', 'ly': 'أولا', 'yh': 'ياهو', 'oi': 'تيندر', 'lf': 'تيك توك'
    };

    // أيقونات
    const serviceIcons = {
        'tg': 'paper-plane', 'wa': 'whatsapp', 'fb': 'facebook', 'ig': 'instagram',
        'tw': 'twitter', 'gm': 'google', 'go': 'google', 'ds': 'discord',
        'nf': 'netflix', 'sn': 'snapchat', 'im': 'message', 'vi': 'viber',
        'pp': 'paypal', 'ts': 'paypal', 'am': 'amazon', 'ub': 'uber'
    };

    // ==================== دوال مساعدة ====================
    function showToast(title, message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastTitle').textContent = title;
        document.getElementById('toastMessage').textContent = message;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function getServiceName(code) {
        return serviceNamesAr[code] || code.toUpperCase();
    }

    function getServiceIcon(code) {
        return serviceIcons[code] || 'globe';
    }

    // ==================== تحميل الخدمات ====================
    async function loadServices() {
        const content = document.getElementById('content');
        content.innerHTML = `<div class="loader"><i class="fas fa-spinner fa-pulse"></i><p>جاري تحميل الخدمات...</p></div>`;

        try {
            const response = await fetch(`${API_URL}/services`);
            const data = await response.json();
            
            if (data.success && data.services) {
                allServices = data.services.map(s => ({
                    ...s,
                    nameAr: getServiceName(s.code)
                }));
                filterServices();
                renderServices();
            } else {
                throw new Error('No services');
            }
        } catch (error) {
            console.error('Error:', error);
            // خدمات احتياطية
            allServices = [
                { code: 'tg', name: 'Telegram' }, { code: 'wa', name: 'WhatsApp' },
                { code: 'gm', name: 'Google' }, { code: 'fb', name: 'Facebook' },
                { code: 'ig', name: 'Instagram' }, { code: 'ds', name: 'Discord' }
            ];
            filterServices();
            renderServices();
            showToast('تنبيه', 'تم تحميل خدمات افتراضية');
        }
    }

    // ==================== عرض الخدمات ====================
    function renderServices() {
        const content = document.getElementById('content');
        
        if (filteredServices.length === 0) {
            content.innerHTML = `<div class="loader"><i class="fas fa-search"></i><p>لا توجد خدمات</p></div>`;
            return;
        }

        const popularCodes = ['tg', 'wa', 'gm', 'fb', 'ig', 'ds'];
        
        content.innerHTML = `
            <div class="section-title">
                <h3>الخدمات المتاحة</h3>
                <span>${filteredServices.length} خدمة</span>
            </div>
            <div class="services-grid">
                ${filteredServices.map(service => {
                    const code = service.code;
                    const name = getServiceName(code);
                    const isPopular = popularCodes.includes(code);
                    
                    return `
                        <div class="service-card" onclick="selectService('${code}')">
                            ${isPopular ? '<span class="popular-badge">🔥 الأكثر طلباً</span>' : ''}
                            <i class="fab fa-${getServiceIcon(code)}"></i>
                            <h4>${name}</h4>
                            <p>${code.toUpperCase()}</p>
                        </div>
                    `;
                }).join('')}
            </div>
        `;
    }

    // ==================== تصفية ====================
    function filterServices() {
        filteredServices = allServices.filter(service => {
            const code = service.code;
            const name = getServiceName(code);
            
            // تصفية حسب البحث
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                if (!name.includes(query) && !code.includes(query)) return false;
            }
            
            return true;
        });
    }

    window.filterCategory = (cat) => {
        currentCategory = cat;
        document.querySelectorAll('.category').forEach((el, i) => {
            el.classList.toggle('active', i === ['all','social','email','finance','other'].indexOf(cat));
        });
        filterServices();
        renderServices();
    };

    window.filterServices = () => {
        searchQuery = document.getElementById('searchInput').value.toLowerCase();
        filterServices();
        renderServices();
    };

    // ==================== اختيار خدمة ====================
    window.selectService = async (code) => {
        selectedService = code;
        const content = document.getElementById('content');
        content.innerHTML = `<div class="loader"><i class="fas fa-spinner fa-pulse"></i><p>جاري تحميل الدول...</p></div>`;

        try {
            const response = await fetch(`${API_URL}/prices?service=${code}`);
            const data = await response.json();
            
            let countries = [];
            if (data.success && data.prices) {
                countries = Object.entries(data.prices).map(([id, info]) => ({
                    id,
                    name: getCountryName(id),
                    price: info.costEgp || info.cost || 15,
                    count: info.count || 0
                })).filter(c => c.count > 0).slice(0, 12);
            }

            if (countries.length === 0) {
                countries = [
                    { id: '0', name: 'روسيا', price: 12.50, count: 10 },
                    { id: '12', name: 'الولايات المتحدة', price: 18.00, count: 8 },
                    { id: '21', name: 'مصر', price: 8.00, count: 15 },
                    { id: '53', name: 'السعودية', price: 14.00, count: 12 }
                ];
            }

            content.innerHTML = `
                <div class="back-btn" onclick="renderServices()">
                    <i class="fas fa-arrow-right"></i>
                    <span>رجوع للخدمات</span>
                </div>
                <div class="section-title">
                    <h3>${getServiceName(code)}</h3>
                    <span>${countries.length} دولة</span>
                </div>
                <div class="countries-grid">
                    ${countries.map(c => `
                        <div class="country-card" onclick="buyNumber('${code}', '${c.id}', '${c.name}', ${c.price})">
                            <div class="country-flag"><i class="fas fa-flag"></i></div>
                            <div class="country-info">
                                <h4>${c.name}</h4>
                                <p>${c.count} رقم متاح</p>
                            </div>
                            <div class="country-price">${c.price.toFixed(2)} ج.م</div>
                        </div>
                    `).join('')}
                </div>
            `;
        } catch (error) {
            content.innerHTML = `<div class="loader"><i class="fas fa-exclamation-triangle"></i><p>حدث خطأ</p><button onclick="renderServices()" style="margin-top:16px;padding:12px 24px;background:var(--primary);border:none;border-radius:30px;color:white;">رجوع</button></div>`;
        }
    };

    function getCountryName(id) {
        const names = {
            '0': 'روسيا', '1': 'أوكرانيا', '2': 'كازاخستان', '12': 'الولايات المتحدة',
            '16': 'إنجلترا', '21': 'مصر', '53': 'السعودية', '73': 'البرازيل',
            '43': 'ألمانيا', '78': 'فرنسا', '86': 'إيطاليا', '62': 'تركيا'
        };
        return names[id] || `دولة ${id}`;
    }

    window.buyNumber = (service, country, countryName, price) => {
        // التحقق من الرصيد
        if (userBalance < price) {
            showToast('رصيد غير كافي', `رصيدك ${userBalance.toFixed(2)} ج.م - المطلوب ${price} ج.م`);
            return;
        }
        
        if (confirm(`تأكيد شراء رقم ${getServiceName(service)} من ${countryName} بسعر ${price} ج.م؟`)) {
            showToast('جاري الشراء', 'يتم معالجة طلبك...');
            // هنا يتم استدعاء API الشراء
            // purchaseNumber(service, country, price);
        }
    };

    // ==================== تحميل بيانات المستخدم ====================
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'auth.html';
            return;
        }
        
        currentUser = user;
        
        try {
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) {
                userBalance = doc.data().balance || 0;
                document.getElementById('balanceDisplay').textContent = userBalance.toFixed(2);
            }
        } catch (e) {
            console.error('Error loading balance:', e);
        }
        
        loadServices();
    });
</script>
</body>
</html>
